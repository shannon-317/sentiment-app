<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>感情分析アプリ</title>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 50px auto; padding: 0 20px; }
    textarea { width: 100%; height: 100px; font-size: 16px; }
    button { margin-top: 10px; padding: 10px 20px; font-size: 16px; cursor: pointer; }
    #result { margin-top: 20px; font-size: 24px; font-weight: bold; }
    .positive { color: green; }
    .negative { color: red; }
  </style>
</head>
<body>
  <h1>感情分析アプリ</h1>
  <textarea id="input" placeholder="テキストを入力してください"></textarea>
  <br>
  <button onclick="analyze()">判定する</button>
  <div id="result"></div>

  <script>
    async function analyze() {
      const text = document.getElementById("input").value;
      const res = await fetch("https://sentiment-app-16ij.onrender.com/predict", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ text })
      });
      const data = await res.json();
      const result = document.getElementById("result");
      result.textContent = data.label === "positive" ? "😊 ポジティブ" : "😞 ネガティブ";
      result.className = data.label;
    }
  </script>
</body>
</html>
